# theme.yaml — Purrfect Match Enterprise Portal Branding
# Clean light theme with purple accents

branding:
  title: "Purrfect Match"
  overview: "Welcome to the Purrfect Match Enterprise Portal."
  contact: support@purrfectproductions.com
  supportPortalLink: https://purrfectproductions.com/support

  primaryColor: "#7c3aed"
  secondaryColor: "#6d28d9"

  linkColor: "#7c3aed"
  linkHoverColor: "#6d28d9"

  headerColor: "#ffffff"
  headerGradientEnd: "#faf5ff"

  sidebarColor: "#faf5ff"
  sidebarGradientEnd: "#f5f3ff"

  contentBackgroundColor: "#ffffff"
  contentBackgroundGradientEnd: "#ffffff"

  background: minimal

customCSS: |
  /* Purple headings */
  main h1 { color: #6d28d9 !important; }
  main h2 { color: #7c3aed !important; }
  main h3, main h4 { color: #5b21b6 !important; }

  /* Active sidebar */
  nav.w-72 a[data-active="true"] {
    color: #7c3aed !important;
    font-weight: 600;
  }

  /* Table header */
  main thead th {
    background-color: #f5f3ff !important;
    color: #5b21b6 !important;
  }

  /* Code */
  main pre {
    background-color: #faf5ff !important;
    border: 1px solid #e9d5ff !important;
    border-radius: 8px !important;
  }
  main code {
    background-color: #f3e8ff !important;
    color: #6d28d9 !important;
    border-radius: 4px !important;
    padding: 1px 4px !important;
  }
  main pre code {
    color: #1f2937 !important;
    background-color: transparent !important;
  }

  /* Subtle purple top border on header */
  header {
    border-bottom: 2px solid #e9d5ff !important;
  }
