# theme.yaml — Purrfect Match Enterprise Portal Branding
# Clean dark purple theme

branding:
  title: "Purrfect Match"
  overview: "Welcome to the Purrfect Match Enterprise Portal."
  contact: support@purrfectproductions.com
  supportPortalLink: https://purrfectproductions.com/support

  primaryColor: "#7c3aed"
  secondaryColor: "#a855f7"

  linkColor: "#a855f7"
  linkHoverColor: "#c084fc"

  headerColor: "#18112b"
  headerGradientEnd: "#1e1534"

  sidebarColor: "#130e21"
  sidebarGradientEnd: "#18112b"

  contentBackgroundColor: "#1a1225"
  contentBackgroundGradientEnd: "#1a1225"

  background: minimal

customCSS: |
  /* Headings */
  main h1 { color: #e9d5ff !important; }
  main h2 { color: #d8b4fe !important; }
  main h3, main h4 { color: #c4b5fd !important; }

  /* Body text */
  main p, main li, main td, main th, main label, main span {
    color: #b8a8d4 !important;
  }
  main strong { color: #f3e8ff !important; }

  /* Links */
  main a { color: #a855f7 !important; }
  main a:hover { color: #c084fc !important; }

  /* Sidebar */
  nav.w-72 a { color: #7c6f99 !important; }
  nav.w-72 a:hover { color: #c084fc !important; }
  nav.w-72 a[data-active="true"] {
    color: #a855f7 !important;
    font-weight: 600;
  }

  /* Tables */
  main thead th {
    background-color: rgba(124, 58, 237, 0.15) !important;
    color: #e9d5ff !important;
  }
  main tbody td {
    border-bottom: 1px solid rgba(124, 58, 237, 0.1) !important;
  }

  /* Code */
  main pre {
    background-color: #110c1d !important;
    border: 1px solid rgba(124, 58, 237, 0.2) !important;
    border-radius: 8px !important;
  }
  main pre code { color: #d8b4fe !important; }
  main code {
    background-color: rgba(124, 58, 237, 0.12) !important;
    color: #c084fc !important;
    border-radius: 4px !important;
    padding: 2px 5px !important;
  }

  /* Forms */
  main select, main input[type="text"] {
    background-color: #221a35 !important;
    color: #e9d5ff !important;
    border: 1px solid rgba(124, 58, 237, 0.2) !important;
    border-radius: 6px !important;
  }
  main input[type="radio"] { accent-color: #a855f7; }
